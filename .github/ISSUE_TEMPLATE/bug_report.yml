name: 🐛 Bug report
description: Something gsccli does that it shouldn't, or doesn't do that it should.
title: "bug: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug.

        > [!CAUTION]
        > **Never paste OAuth tokens, service-account JSON, or `gsccli auth status` output containing real account details.**
        > Redact site URLs / GA property IDs if you consider them sensitive. The text you paste here is public.

  - type: textarea
    id: command
    attributes:
      label: Command you ran
      description: The exact `gsccli …` invocation, including flags. Wrap in a code block.
      placeholder: |
        gsccli query top-queries --site https://example.com/ --start 2026-04-01 --end 2026-04-30 --format json
      render: bash
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: What actually happened
      description: Copy the actual stdout / stderr. Redact secrets.
      render: text
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What you expected to happen
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: gsccli version
      description: Output of `gsccli --version`.
      placeholder: "1.1.0"
    validations:
      required: true

  - type: input
    id: node
    attributes:
      label: Node.js version
      description: Output of `node --version`.
      placeholder: "v22.11.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - Windows (native)
        - Windows (WSL2)
        - Other / unsure
    validations:
      required: true

  - type: dropdown
    id: install
    attributes:
      label: Install method
      options:
        - pnpm/npm global (`pnpm add -g gsccli`)
        - From source (`pnpm dev`)
        - SEA single-binary
        - Other / unsure
    validations:
      required: true

  - type: dropdown
    id: auth
    attributes:
      label: Auth method in use
      options:
        - OAuth (`gsccli auth login`)
        - Service account (`GOOGLE_APPLICATION_CREDENTIALS`)
        - Service account (`credentials` config key)
        - Not yet authenticated
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Verbose logs
      description: Re-run with `--verbose` and paste the relevant slice. Redact site/account identifiers if needed.
      render: text

  - type: checkboxes
    id: confirm
    attributes:
      label: Confirmations
      options:
        - label: I searched [existing issues](https://github.com/nalyk/gsccli/issues?q=is%3Aissue) for duplicates.
          required: true
        - label: I redacted any tokens, service-account JSON, and account-identifying details from the output above.
          required: true
        - label: I am running gsccli on Node.js >= 22.
          required: true
